name: Crypto Behavior Dashboard

on:
  schedule:
    - cron: "7 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-dashboard.yml"
      - "config.yaml"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect market data
        run: python3 -m src.cli daily-collect

      - name: Update event outcomes
        run: python3 -m src.cli update-outcomes --all

      - name: Generate Markdown report
        run: python3 -m src.cli generate-report --date "$(date +%F)"

      - name: Generate static dashboard
        run: python3 -m src.cli generate-dashboard

      - name: Commit updated dashboard and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/processed/snapshots.csv data/processed/prices.csv events/events.jsonl reports/*.md
          git diff --cached --quiet || git commit -m "Update daily crypto behavior dashboard"
          git push
